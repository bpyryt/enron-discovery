<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Enron Discovery{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #1f2937;
            margin: 0;
            padding: 0;
        }

        header {
            background: #111827;
            color: white;
            padding: 18px 32px;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            color: #dbeafe;
            text-decoration: none;
            margin-right: 18px;
            font-weight: 600;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .btn {
            display: inline-block;
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #111827;
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }

        .grid {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
        }

        th {
            background: #f9fafb;
        }

        input, select {
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            min-width: 180px;
        }

        form.filter-form {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: end;
        }

        .muted {
            color: #6b7280;
        }

        .message-card h3 {
            margin-top: 0;
            margin-bottom: 8px;
        }

        .message-card a.title-link {
            color: #111827;
            text-decoration: none;
        }

        .message-card a.title-link:hover {
            color: #2563eb;
        }

        .hero {
            padding: 24px;
        }

        .hero h2 {
            margin-top: 0;
            font-size: 32px;
        }

        .hero p {
            font-size: 18px;
            line-height: 1.6;
        }

        pre.message-body {
            white-space: pre-wrap;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <header>
        <h1>Enron Discovery</h1>
        <nav>
            <a href="{% url 'home' %}">Accueil</a>
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'message_list' %}">Messages</a>
            <a href="/admin/">Admin</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
